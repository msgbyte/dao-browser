<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="agent.css">
</head>
<body>

<!-- Header with tab bar -->
<div class="header">
  <span class="header-title">Dao Agent</span>
  <div class="tab-bar">
    <button class="tab active" data-tab="chat">Chat</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>
</div>

<!-- Chat View (default) -->
<div class="chat-view" id="chatView">
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#129302;</div>
      <div class="title">Dao Agent</div>
      <div class="hint">Ask me anything about the current page,<br>or request actions like summarizing content.</div>
    </div>
  </div>

  <div class="input-area">
    <button class="tool-btn" id="pageBtn" title="Inject page content into context">&#128196;</button>
    <div class="input-wrapper">
      <textarea id="userInput" rows="1" placeholder="Message Dao Agent..."></textarea>
    </div>
    <button class="send-btn" id="sendBtn" title="Send">&#9654;</button>
  </div>
</div>

<!-- Settings View (hidden) -->
<div class="settings-view" id="settingsView" style="display:none;">
  <div class="settings-sub-tabs">
    <button class="sub-tab active" data-subtab="soul">Soul</button>
    <button class="sub-tab" data-subtab="connection">Connection</button>
  </div>

  <!-- Soul Panel -->
  <div class="settings-panel-content" id="soulPanel">
    <div class="section-title">Soul Prompt</div>
    <div class="section-desc">Define the AI agent's personality and behavior. This is used as the system prompt in every conversation.</div>
    <textarea id="soulEditor" class="soul-editor" placeholder="Enter your soul prompt here..."></textarea>
    <div class="soul-actions">
      <button class="btn-primary" id="saveSoulBtn">Save</button>
      <button class="btn-secondary" id="resetSoulBtn">Reset to Default</button>
      <span class="save-status" id="saveStatus"></span>
    </div>
  </div>

  <!-- Connection Panel -->
  <div class="settings-panel-content" id="connectionPanel" style="display:none;">
    <div class="section-title">API Connection</div>
    <div class="section-desc">Configure the LLM API endpoint for the agent.</div>
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <label>Base URL</label>
    <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
    <label>Model</label>
    <input type="text" id="model" placeholder="gpt-5">
  </div>
</div>

<script src="agent.js"></script>
</body>
</html>
