<!DOCTYPE html>
<!-- Dao's sidebar is a LIGHT purple-gray surface (dao_colors.h:
     kSidebarBackground = RGB(201,197,208)). pi-web-ui's `:root` theme
     is already light — we override the subset of tokens we want
     (translucent white cards, Dao purple `--primary`, dark text) in
     agent.css under a `dao-chat-view, pi-chat-panel` scope. Do NOT
     add `class="dark"` here: it activates pi-web-ui's dark syntax
     highlighting and every `dark:*` Tailwind variant, fighting the
     light base. -->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="vendor/pi_web_ui.css">
<link rel="stylesheet" href="agent.css">
</head>
<body>
<dao-agent-app></dao-agent-app>
<!-- Generated virtual resource exposed by WebUIDataSource::UseStringsJs().
     Provides the loadTimeData object containing keys registered in C++
     (see dao_agent_ui.cc), e.g. `dao_app_locale`. The strings.m.js bundle
     is itself an ES module (it imports loadTimeData) — must use
     type="module". Must precede agent.js so the i18n module sees the
     populated loadTimeData on first import. -->
<script type="module" src="strings.m.js"></script>
<script type="module" src="agent.js"></script>
</body>
</html>
